<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neil Oliver – Books,Application & Music</title>

  <link rel="manifest" href="manifest.json">

 <link rel="icon" type="image/png" href="assets/favicon.png" sizes="128x128">

<link rel="apple-touch-icon" href="assets/icon.png">

<link rel="manifest" href="manifest.json">
  <script src="https://www.paypal.com/sdk/js?client-id=AWMjw-JB6E8nFkjToPpNNJkpPk9lxnp1I8IF13-djVLcOQ2daRj2k8tCM4jEHkjm_C8mPpnyO1Wj_rF4&currency=USD&components=buttons,hosted-fields&disable-funding=venmo,credit"></script>

  <style>
    :root {
      --primary: #8b4513;
      --secondary: #4a2c0d;
      --accent: #d4af37;
      --text: #f5f5f5;
      --overlay: rgba(0,0,0,0.58);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #0f0a00;
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      height: 100vh;
      min-height: 700px;
      background: var(--overlay) url('assets/BM.png') center center / cover no-repeat fixed;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      padding: 80px 20px 60px;
    }

    .top-content {
      max-width: 920px;
      width: 100%;
    }

    h1 {
      font-size: clamp(2.8rem, 7vw, 5.2rem);
      font-weight: 700;
      text-shadow: 0 6px 24px rgba(0,0,0,0.95);
      letter-spacing: 1.5px;
      margin-bottom: 0.4em;
    }

    .subtitle {
      font-size: clamp(1.6rem, 4.5vw, 2.4rem);
      font-style: italic;
      text-shadow: 0 4px 16px rgba(0,0,0,0.9);
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-bottom: 5vh;
    }

    .btn {
      padding: 18px 64px;
      min-width: 250px;
      font-size: 1.5rem;
      font-weight: bold;
      text-decoration: none;
      color: #111;
      background: var(--accent);
      border-radius: 60px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.7);
      transition: all 0.35s ease;
      cursor: pointer;
      border: none;
    }

    .btn-book {
      transform: translateY(-5px);
      background: #e8c56a;
     
    }
     .btn-app {
      transform: translateY(-5px);
      background: #380589;
    }

    .btn-music {
      background: #b8860b;
      color: white;
    }

    /* Paywall Modal – now scrollable on small screens */
    #paywall-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 2000;
      overflow-y: auto; /* ← FIX: allows scrolling if content too tall */
      padding: 20px;
    }

    .modal-box {
      background: #140b00;
      padding: 40px 30px;
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      margin: auto; /* centers vertically when scrollable */
      text-align: center;
      border: 1px solid #d4af37;
      box-shadow: 0 20px 70px rgba(0,0,0,0.9);
      min-height: fit-content;
    }

    .close-btn {
      margin-top: 20px;
      background: transparent;
      color: #999;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="top-content">
      <img src="assets/monogram.png" alt="Monogram" style="width:80px; margin-bottom:20px;">
      <h1>Neil Oliver</h1>
      <div class="subtitle">Books,Application & Music</div>
    </div>

    <div class="buttons">
      <a href="books.html" class="btn btn-book" >Books</a>
      <a href="App.html" class="btn btn-app">Neil's App Hub</a>
      <button type="button" id="music-btn" class="btn btn-music">Music</button>
    </div>
  </div>

  <div id="paywall-modal">
    <div class="modal-box">
      <h2 style="color:var(--accent); margin-bottom:20px;">Unlock The Library</h2>
      <p style="margin-bottom:30px;">One-time payment • $3<br>Full access forever</p>
      <div id="paypal-button-container"></div>
      <button class="close-btn" id="close-modal">Maybe Later</button>
    </div>
  </div>

  <script>
    const MUSIC_PAID_KEY = 'neilOliverMusicUnlocked';
    let deferredPrompt;

    // 1. Detect iOS for Safari instructions
    const isIOS = () => {
      return [
        'iPad Simulator', 'iPhone Simulator', 'iPod Simulator', 'iPad', 'iPhone', 'iPod'
      ].includes(navigator.platform) || (navigator.userAgent.includes("Mac") && "ontouchend" in document);
    };

    // 2. Capture the PWA Install Event (Android/Windows)
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // 3. PayPal Integration
    paypal.Buttons({
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{ amount: { value: '3.00' } }],
          application_context: { shipping_preference: "NO_SHIPPING" }
        });
      },
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          localStorage.setItem(MUSIC_PAID_KEY, 'true');
          
          // Handle Installation Prompt after payment
          if (isIOS()) {
            alert('Success! To keep the Library app on your iPhone, tap the "Share" icon in Safari (square with arrow) and select "Add to Home Screen".');
            window.location.href = 'music.html';
          } else if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
              window.location.href = 'music.html';
            });
          } else {
            window.location.href = 'music.html';
          }
        });
      }
    }).render('#paypal-button-container');

    // 4. Music Button Logic
    document.getElementById('music-btn').addEventListener('click', function() {
      if (localStorage.getItem(MUSIC_PAID_KEY) === 'true') {
        window.location.href = 'music.html';
      } else {
        document.getElementById('paywall-modal').style.display = 'flex';
      }
    });

    document.getElementById('close-modal').addEventListener('click', function() {
      document.getElementById('paywall-modal').style.display = 'none';
    });
  </script>

</body>
</html>
